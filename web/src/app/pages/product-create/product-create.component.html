<section class="mb-4">
  <h1 class="h3 mb-1">Criar produto</h1>
  <p class="text-secondary mb-0">Preencha os dados para cadastrar um novo produto.</p>
</section>

<div *ngIf="errorMessage" class="alert alert-danger" role="alert">
  {{ errorMessage }}
</div>

<form class="card shadow-sm border-0" [formGroup]="form" (ngSubmit)="submit()" novalidate>
  <div class="card-body row g-3">
    <div class="col-12">
      <label for="name" class="form-label">Nome *</label>
      <input id="name" class="form-control" formControlName="name" />
      <small class="text-danger" *ngIf="form.controls.name.touched && form.controls.name.invalid">
        Informe um nome entre 2 e 120 caracteres.
      </small>
    </div>

    <div class="col-12">
      <label for="description" class="form-label">Descricao</label>
      <textarea id="description" class="form-control" rows="3" formControlName="description"></textarea>
    </div>

    <div class="col-12 col-md-6">
      <label for="price" class="form-label">Preco *</label>
      <input id="price" type="number" class="form-control" step="0.01" formControlName="price" />
      <small class="text-danger" *ngIf="form.controls.price.touched && form.controls.price.invalid">
        Informe um preco valido maior ou igual a zero.
      </small>
    </div>

    <div class="col-12 col-md-6">
      <label for="stock" class="form-label">Estoque *</label>
      <input id="stock" type="number" class="form-control" step="1" formControlName="stock" />
      <small class="text-danger" *ngIf="form.controls.stock.touched && form.controls.stock.invalid">
        Informe um valor inteiro maior ou igual a zero.
      </small>
    </div>
  </div>

  <div class="card-footer bg-white d-flex justify-content-end gap-2">
    <a routerLink="/products" class="btn btn-outline-secondary">Cancelar</a>
    <button type="submit" class="btn btn-primary" [disabled]="saving">
      {{ saving ? 'Salvando...' : 'Salvar' }}
    </button>
  </div>
</form>
